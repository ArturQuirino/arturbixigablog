<?xml version="1.0" encoding="UTF-8"?>
<svg width="800" height="430" viewBox="0 0 800 430" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arr-gray" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4A5568"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#48BB78"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="430" fill="#0F1117"/>

  <!-- Title -->
  <text x="400" y="36" text-anchor="middle" fill="#E2E8F0" font-family="system-ui, sans-serif" font-size="15" font-weight="600">O que instrui o bundler a criar um chunk</text>

  <!-- Center divider -->
  <line x1="400" y1="52" x2="400" y2="410" stroke="#2D3748" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- ═══ LEFT COLUMN: import estático ═══ -->

  <!-- Column label -->
  <text x="200" y="72" text-anchor="middle" fill="#63B3ED" font-family="'Courier New', monospace" font-size="13" font-weight="700">import estático</text>

  <!-- Code box -->
  <rect x="30" y="84" width="340" height="52" rx="6" fill="#161B2E" stroke="#2D3748" stroke-width="1"/>
  <text x="200" y="107" text-anchor="middle" fill="#68D391" font-family="'Courier New', monospace" font-size="12">import { X } from './x'</text>
  <text x="200" y="126" text-anchor="middle" fill="#718096" font-family="system-ui, sans-serif" font-size="11">importação síncrona</text>

  <!-- Arrow: code → BUNDLER -->
  <line x1="200" y1="137" x2="200" y2="163" stroke="#4A5568" stroke-width="2" marker-end="url(#arr-gray)"/>

  <!-- BUNDLER box -->
  <rect x="128" y="167" width="144" height="36" rx="6" fill="#2D3748" stroke="#4A5568" stroke-width="1"/>
  <text x="200" y="190" text-anchor="middle" fill="#CBD5E0" font-family="system-ui, sans-serif" font-size="13" font-weight="600">BUNDLER</text>

  <!-- Arrow: BUNDLER → output -->
  <line x1="200" y1="204" x2="200" y2="232" stroke="#4A5568" stroke-width="2" marker-end="url(#arr-gray)"/>

  <!-- Output: main.js com X incluído -->
  <rect x="80" y="236" width="240" height="80" rx="6" fill="#1A2744" stroke="#3182CE" stroke-width="1.5"/>
  <text x="200" y="261" text-anchor="middle" fill="#90CDF4" font-family="'Courier New', monospace" font-size="14" font-weight="700">main.js</text>
  <text x="200" y="283" text-anchor="middle" fill="#A0AEC0" font-family="'Courier New', monospace" font-size="12">+ código de X</text>
  <text x="200" y="301" text-anchor="middle" fill="#718096" font-family="system-ui, sans-serif" font-size="10">bundle único, carregado no início</text>

  <!-- Footer -->
  <text x="200" y="345" text-anchor="middle" fill="#FC8181" font-family="system-ui, sans-serif" font-size="11">X incluído no bundle principal</text>
  <text x="200" y="362" text-anchor="middle" fill="#FC8181" font-family="system-ui, sans-serif" font-size="11">sem separação de código</text>

  <!-- ═══ RIGHT COLUMN: import() dinâmico ═══ -->

  <!-- Column label -->
  <text x="600" y="72" text-anchor="middle" fill="#63B3ED" font-family="'Courier New', monospace" font-size="13" font-weight="700">import() dinâmico</text>

  <!-- Code box -->
  <rect x="430" y="84" width="340" height="52" rx="6" fill="#161B2E" stroke="#2D3748" stroke-width="1"/>
  <text x="600" y="107" text-anchor="middle" fill="#68D391" font-family="'Courier New', monospace" font-size="12">import('./x')</text>
  <text x="600" y="126" text-anchor="middle" fill="#718096" font-family="system-ui, sans-serif" font-size="11">ponto de entrada assíncrono</text>

  <!-- Arrow: code → BUNDLER -->
  <line x1="600" y1="137" x2="600" y2="163" stroke="#4A5568" stroke-width="2" marker-end="url(#arr-gray)"/>

  <!-- BUNDLER box -->
  <rect x="528" y="167" width="144" height="36" rx="6" fill="#2D3748" stroke="#4A5568" stroke-width="1"/>
  <text x="600" y="190" text-anchor="middle" fill="#CBD5E0" font-family="system-ui, sans-serif" font-size="13" font-weight="600">BUNDLER</text>

  <!-- Split arrows: BUNDLER → dois outputs -->
  <line x1="600" y1="204" x2="510" y2="232" stroke="#4A5568" stroke-width="1.5" marker-end="url(#arr-gray)"/>
  <line x1="600" y1="204" x2="693" y2="232" stroke="#48BB78" stroke-width="1.5" marker-end="url(#arr-green)"/>

  <!-- Output esquerdo: main.js (sem X) -->
  <rect x="432" y="236" width="150" height="80" rx="6" fill="#1A2744" stroke="#2B6CB0" stroke-width="1.5"/>
  <text x="507" y="261" text-anchor="middle" fill="#718096" font-family="'Courier New', monospace" font-size="14" font-weight="700">main.js</text>
  <text x="507" y="283" text-anchor="middle" fill="#718096" font-family="system-ui, sans-serif" font-size="11">(sem X)</text>
  <text x="507" y="301" text-anchor="middle" fill="#4A5568" font-family="system-ui, sans-serif" font-size="10">bundle inicial</text>

  <!-- Output direito: chunk-x.js -->
  <rect x="618" y="236" width="150" height="80" rx="6" fill="#1A3320" stroke="#48BB78" stroke-width="1.5"/>
  <text x="693" y="261" text-anchor="middle" fill="#68D391" font-family="'Courier New', monospace" font-size="14" font-weight="700">chunk-x.js</text>
  <text x="693" y="283" text-anchor="middle" fill="#A0AEC0" font-family="'Courier New', monospace" font-size="11">código de X</text>
  <text x="693" y="301" text-anchor="middle" fill="#718096" font-family="system-ui, sans-serif" font-size="10">chunk separado</text>

  <!-- Footer -->
  <text x="600" y="345" text-anchor="middle" fill="#68D391" font-family="system-ui, sans-serif" font-size="11">X isolado em chunk separado</text>
  <text x="600" y="362" text-anchor="middle" fill="#68D391" font-family="system-ui, sans-serif" font-size="11">carregado sob demanda</text>
</svg>
