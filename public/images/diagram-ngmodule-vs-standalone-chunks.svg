<?xml version="1.0" encoding="UTF-8"?>
<svg width="800" height="380" viewBox="0 0 800 380" xmlns="http://www.w3.org/2000/svg">

  <!-- Background -->
  <rect width="800" height="380" fill="#0F1117"/>

  <!-- Title -->
  <text x="400" y="34" text-anchor="middle" fill="#E2E8F0" font-family="system-ui, sans-serif" font-size="15" font-weight="600">NgModule vs Standalone — o que realmente cria um chunk</text>

  <!-- Destaque verde na coluna import() dinâmico -->
  <rect x="490" y="48" width="310" height="252" fill="#0D2B1A"/>

  <!-- Borda verde no topo da coluna destacada -->
  <rect x="490" y="48" width="310" height="5" fill="#48BB78"/>

  <!-- Grade: borda externa -->
  <rect x="0" y="48" width="800" height="252" fill="none" stroke="#2D3748" stroke-width="1"/>

  <!-- Divisores verticais -->
  <line x1="185" y1="48" x2="185" y2="300" stroke="#2D3748" stroke-width="1"/>
  <line x1="490" y1="48" x2="490" y2="300" stroke="#4A5568" stroke-width="1.5"/>

  <!-- Divisores horizontais -->
  <line x1="0" y1="100" x2="800" y2="100" stroke="#2D3748" stroke-width="1"/>
  <line x1="0" y1="200" x2="800" y2="200" stroke="#2D3748" stroke-width="1"/>

  <!-- Cabeçalho: célula vazia superior esquerda -->
  <text x="92" y="80" text-anchor="middle" fill="#718096" font-family="system-ui, sans-serif" font-size="11">tipo de módulo</text>

  <!-- Cabeçalho: import estático -->
  <text x="337" y="74" text-anchor="middle" fill="#A0AEC0" font-family="'Courier New', monospace" font-size="13" font-weight="600">import estático</text>
  <text x="337" y="92" text-anchor="middle" fill="#718096" font-family="system-ui, sans-serif" font-size="10">(síncrono)</text>

  <!-- Cabeçalho: import() dinâmico -->
  <text x="645" y="74" text-anchor="middle" fill="#68D391" font-family="'Courier New', monospace" font-size="13" font-weight="700">import() dinâmico</text>
  <text x="645" y="92" text-anchor="middle" fill="#4CAF7D" font-family="system-ui, sans-serif" font-size="10">(assíncrono)</text>

  <!-- Linha 1: NgModule -->

  <!-- Rótulo da linha -->
  <text x="92" y="145" text-anchor="middle" fill="#90CDF4" font-family="'Courier New', monospace" font-size="13" font-weight="600">NgModule</text>

  <!-- Célula 1: sem chunk -->
  <text x="337" y="138" text-anchor="middle" fill="#FC8181" font-family="system-ui, sans-serif" font-size="22">✕</text>
  <text x="337" y="161" text-anchor="middle" fill="#FC8181" font-family="system-ui, sans-serif" font-size="13" font-weight="600">sem chunk</text>
  <text x="337" y="181" text-anchor="middle" fill="#718096" font-family="'Courier New', monospace" font-size="10">imports: [AdminModule]</text>

  <!-- Célula 2: chunk criado -->
  <text x="645" y="138" text-anchor="middle" fill="#68D391" font-family="system-ui, sans-serif" font-size="22">✓</text>
  <text x="645" y="161" text-anchor="middle" fill="#68D391" font-family="system-ui, sans-serif" font-size="13" font-weight="600">chunk criado</text>
  <text x="645" y="181" text-anchor="middle" fill="#4CAF7D" font-family="'Courier New', monospace" font-size="10">loadChildren(() => import(...))</text>

  <!-- Linha 2: Standalone -->

  <!-- Rótulo da linha -->
  <text x="92" y="245" text-anchor="middle" fill="#90CDF4" font-family="'Courier New', monospace" font-size="13" font-weight="600">Standalone</text>

  <!-- Célula 1: sem chunk -->
  <text x="337" y="238" text-anchor="middle" fill="#FC8181" font-family="system-ui, sans-serif" font-size="22">✕</text>
  <text x="337" y="261" text-anchor="middle" fill="#FC8181" font-family="system-ui, sans-serif" font-size="13" font-weight="600">sem chunk</text>
  <text x="337" y="281" text-anchor="middle" fill="#718096" font-family="'Courier New', monospace" font-size="10">component: DashboardComponent</text>

  <!-- Célula 2: chunk criado -->
  <text x="645" y="238" text-anchor="middle" fill="#68D391" font-family="system-ui, sans-serif" font-size="22">✓</text>
  <text x="645" y="261" text-anchor="middle" fill="#68D391" font-family="system-ui, sans-serif" font-size="13" font-weight="600">chunk criado</text>
  <text x="645" y="281" text-anchor="middle" fill="#4CAF7D" font-family="'Courier New', monospace" font-size="10">loadComponent(() => import(...))</text>

  <!-- Legenda inferior -->
  <text x="400" y="328" text-anchor="middle" fill="#A0AEC0" font-family="system-ui, sans-serif" font-size="12">O tipo de import determina o chunk — não o tipo de módulo</text>
  <text x="400" y="352" text-anchor="middle" fill="#718096" font-family="system-ui, sans-serif" font-size="11">Standalone elimina o módulo wrapper, mas o mecanismo de chunking é idêntico</text>

</svg>
